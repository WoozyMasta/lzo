name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: rvben/rumdl@v0

      - name: Install liblzo2
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends liblzo2-dev

      - name: Run CI
        run: make ci test-compat test-race fuzz

      - name: Extract changelog
        run: make release-notes > release.md

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: release.md

      - name: Request pkg.go.dev reindex
        env:
          MODULE: github.com/woozymasta/lzo
          VERSION: ${{ github.ref_name }}
        run: >-
          curl -sSfX POST --retry 3 --retry-delay 2
          "https://pkg.go.dev/fetch/${MODULE}@${VERSION}"
