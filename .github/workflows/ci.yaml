name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: rvben/rumdl@v0

      - name: Install liblzo2
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends liblzo2-dev

      - name: Run CI
        run: make ci test-compat
